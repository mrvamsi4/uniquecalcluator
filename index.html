<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0f766e, #111827);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
      padding: 20px;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 25px;
      color: white;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .tabs button.active,
    .tabs button:hover {
      background: linear-gradient(135deg, #38bdf8, #2563eb);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 11px 12px;
      border: none;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 15px;
      outline: none;
    }

    .subject-row {
      background: rgba(255, 255, 255, 0.12);
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .subject-title {
      margin-bottom: 10px;
      font-weight: bold;
      color: #dbeafe;
    }

    .row-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .calc-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .calc-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
    }

    .result {
      margin-top: 16px;
      background: rgba(255, 255, 255, 0.14);
      padding: 14px;
      border-radius: 14px;
      line-height: 1.8;
      font-size: 15px;
    }

    .highlight {
      color: #fde68a;
      font-weight: bold;
    }

    @media (max-width: 500px) {
      .row-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 23px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Student Smart Calculator</h1>

    <div class="tabs">
      <button class="active" onclick="showTab('attendance', this)">Attendance</button>
      <button onclick="showTab('gpa', this)">SGPA</button>
    </div>

    <!-- Attendance Section -->
    <div class="section active" id="attendance">
      <label>Total Classes Held</label>
      <input type="number" id="totalClasses" placeholder="Enter total classes" />

      <label>Classes Attended</label>
      <input type="number" id="attendedClasses" placeholder="Enter attended classes" />

      <button class="calc-btn" onclick="calculateAttendance()">Calculate Attendance</button>

      <div class="result" id="attendanceResult">
        Enter attendance details to check percentage and bunk status.
      </div>
    </div>

    <!-- GPA Section -->
    <div class="section" id="gpa">
      <label>Number of Subjects (Max 10)</label>
      <select id="numSubjects" onchange="generateSubjects()">
        <option value="">Select number of subjects</option>
        <option value="1">1 Subject</option>
        <option value="2">2 Subjects</option>
        <option value="3">3 Subjects</option>
        <option value="4">4 Subjects</option>
        <option value="5">5 Subjects</option>
        <option value="6">6 Subjects</option>
        <option value="7">7 Subjects</option>
        <option value="8">8 Subjects</option>
        <option value="9">9 Subjects</option>
        <option value="10">10 Subjects</option>
      </select>

      <div id="subjectsContainer"></div>

      <button class="calc-btn" onclick="calculateSGPA()">Calculate SGPA</button>

      <div class="result" id="gpaResult">
        Select subjects, grades, and credits to calculate SGPA.
      </div>
    </div>
  </div>

  <script>
    function showTab(tabId, btn) {
      document.querySelectorAll(".section").forEach(section => {
        section.classList.remove("active");
      });
      document.querySelectorAll(".tabs button").forEach(button => {
        button.classList.remove("active");
      });

      document.getElementById(tabId).classList.add("active");
      btn.classList.add("active");
    }

    function calculateAttendance() {
      const total = parseInt(document.getElementById("totalClasses").value);
      const attended = parseInt(document.getElementById("attendedClasses").value);
      const result = document.getElementById("attendanceResult");

      if (isNaN(total) || isNaN(attended) || total <= 0 || attended < 0 || attended > total) {
        result.innerHTML = "Please enter valid class details.";
        return;
      }

      const percentage = ((attended / total) * 100).toFixed(2);

      if (attended / total >= 0.75) {
        const bunkAllowed = Math.floor((attended / 0.75) - total);
        result.innerHTML = `
          Current Attendance: <span class="highlight">${percentage}%</span><br>
          You can bunk <span class="highlight">${bunkAllowed}</span> more class(es) and stay above 75%.
        `;
      } else {
        const needToAttend = Math.ceil((0.75 * total - attended) / 0.25);
        result.innerHTML = `
          Current Attendance: <span class="highlight">${percentage}%</span><br>
          You need to attend <span class="highlight">${needToAttend}</span> more class(es) continuously to reach 75%.
        `;
      }
    }

    function generateSubjects() {
      const num = parseInt(document.getElementById("numSubjects").value);
      const container = document.getElementById("subjectsContainer");
      container.innerHTML = "";

      if (isNaN(num) || num < 1 || num > 10) return;

      for (let i = 1; i <= num; i++) {
        container.innerHTML += `
          <div class="subject-row">
            <div class="subject-title">Subject ${i}</div>
            <div class="row-grid">
              <div>
                <label>Grade</label>
                <select class="grade">
                  <option value="">Select Grade</option>
                  <option value="10">S</option>
                  <option value="9">A</option>
                  <option value="8">B</option>
                  <option value="7">C</option>
                  <option value="6">D</option>
                  <option value="0">F</option>
                </select>
              </div>
              <div>
                <label>Credits</label>
                <input type="number" class="credit" min="1" step="1" placeholder="Enter credits" />
              </div>
            </div>
          </div>
        `;
      }
    }

    function calculateSGPA() {
      const grades = document.querySelectorAll(".grade");
      const credits = document.querySelectorAll(".credit");
      const result = document.getElementById("gpaResult");

      if (grades.length === 0) {
        result.innerHTML = "Please select number of subjects first.";
        return;
      }

      let totalCreditPoints = 0;
      let totalCredits = 0;
      let hasFail = false;

      for (let i = 0; i < grades.length; i++) {
        const gradePoint = parseFloat(grades[i].value);
        const credit = parseFloat(credits[i].value);

        if (isNaN(gradePoint) || isNaN(credit) || credit <= 0) {
          result.innerHTML = "Please select all grades and enter valid credits.";
          return;
        }

        if (gradePoint === 0) {
          hasFail = true;
        }

        totalCreditPoints += gradePoint * credit;
        totalCredits += credit;
      }

      const sgpa = (totalCreditPoints / totalCredits).toFixed(2);

      result.innerHTML = `
        Total Credits: <span class="highlight">${totalCredits}</span><br>
        Total Credit Points: <span class="highlight">${totalCreditPoints}</span><br>
        SGPA: <span class="highlight">${sgpa}</span>
        ${hasFail ? "<br><span class='highlight'>Note: You have at least one F grade.</span>" : ""}
      `;
    }
  </script>

</body>
</html>
