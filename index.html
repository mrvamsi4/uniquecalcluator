<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Student Smart Calculator</h1>

    <div class="tabs">
      <button class="active" onclick="showTab('attendance', this)">Attendance</button>
      <button onclick="showTab('gpa', this)">SGPA</button>
    </div>

    <!-- Attendance Section -->
    <div class="section active" id="attendance">
      <label>Total Classes Held</label>
      <input type="number" id="totalClasses" placeholder="Enter total classes" />

      <label>Classes Attended</label>
      <input type="number" id="attendedClasses" placeholder="Enter attended classes" />

      <button class="calc-btn" onclick="calculateAttendance()">Calculate Attendance</button>

      <div class="result" id="attendanceResult">
        Enter attendance details to check percentage and bunk status.
      </div>
    </div>

    <!-- GPA Section -->
    <div class="section" id="gpa">
      <label>Number of Subjects (Max 10)</label>
      <select id="numSubjects" onchange="generateSubjects()">
        <option value="">Select number of subjects</option>
        <option value="1">1 Subject</option>
        <option value="2">2 Subjects</option>
        <option value="3">3 Subjects</option>
        <option value="4">4 Subjects</option>
        <option value="5">5 Subjects</option>
        <option value="6">6 Subjects</option>
        <option value="7">7 Subjects</option>
        <option value="8">8 Subjects</option>
        <option value="9">9 Subjects</option>
        <option value="10">10 Subjects</option>
      </select>

      <div id="subjectsContainer"></div>

      <button class="calc-btn" onclick="calculateSGPA()">Calculate SGPA</button>

      <div class="result" id="gpaResult">
        Select subjects, grades, and credits to calculate SGPA.
      </div>
    </div>
  </div>
  <script src="script.js"></script>

</body>
</html>
